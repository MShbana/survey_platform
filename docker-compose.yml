services:
  db:
    image: postgres:17-alpine
    container_name: survey_db
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    env_file:
      - .env
    environment:
      - TZ=${TZ}
      - PGTZ=${PGTZ}
    healthcheck:
      test: ["CMD-SHELL", "psql -U ${POSTGRES_USER} -d ${POSTGRES_DB} -c 'SELECT 1'"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    container_name: survey_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      args:
        DEV: "true"
    container_name: survey_web
    command: >
      sh -c "gunicorn config.wsgi:application --reload --bind 0.0.0.0:8000 --workers 4"
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - logs_volume:/app/logs:rw
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - TZ=${TZ}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_worker:
    build:
      context: .
      args:
        DEV: "true"
    container_name: survey_celery_worker
    restart: unless-stopped
    command: celery -A config.celery worker --loglevel=info
    env_file:
      - .env
    environment:
      - TZ=${TZ}
    volumes:
      - .:/app
      - logs_volume:/app/logs:rw
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  static_volume:
  logs_volume:
